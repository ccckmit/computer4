[package]
name = "world4"
version = "0.1.0"
edition = "2021"

[dependencies]
rand = "0.8"
tungstenite = "0.20"

[lib]
name = "world4"
path = "src/lib.rs"

[[bin]]
name = "world4"
path = "src/main.rs"

[[example]]
name = "frozen_lake_example"
path = "examples/frozen_lake_example.rs"

[[example]]
name = "frozen_lake_qtable"
