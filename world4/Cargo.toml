[[example]]
name = "pong_closed_form"
path = "examples/pong_closed_form.rs"

[[bin]]
name = "world4_cartpole_render_test"
path = "src/render/test_cartpole.rs"

[[bin]]
name = "world4_pong_render_test"
path = "src/render/test_pong.rs"