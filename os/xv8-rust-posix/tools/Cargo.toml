[package]
name = "xv8-tools"
version = "0.1.0"
edition = "2021"

[dependencies]
kernel = { package = "xv8", path = "../../kernel" }

[lib]
name = "xv8tools"
path = "src/lib.rs"

[[bin]]
name = "cp"
path = "src/bin/cp.rs"

[[bin]]
name = "mv"
path = "src/bin/mv.rs"

[[bin]]
name = "chmod"
path = "src/bin/chmod.rs"

[[bin]]
name = "chown"
